name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libncurses5-dev openjdk-17-jdk wget unzip

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython

      - name: Setup Android SDK & accept licenses
        run: |
          # Create Android SDK directory
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $ANDROID_HOME/licenses
          mkdir -p $ANDROID_HOME/cmdline-tools/latest

          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf /tmp/cmdline-tools /tmp/cmdline-tools.zip

          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true
          
          # Also directly write license files
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_HOME/licenses/android-sdk-license

          # Install required SDK platforms
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 || true

          echo "SDK setup complete"

      - name: Build APK
        run: |
          export CI=true
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          # Run buildozer with auto-yes
          yes | buildozer android debug 2>&1

      - name: List build artifacts
        run: |
          echo "Checking for APK..."
          find ${{ github.workspace }} -name "*.apk" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoxyIRL-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_name == 'main' || github.ref_name == 'master'
        with:
          name: Roxy IRL v1.0
          tag_name: v1.0
          draft: false
          prerelease: false
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
