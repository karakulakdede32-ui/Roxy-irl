name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Accept SDK licenses and Build APK
        run: |
          # Set CI to avoid interactive prompts
          export CI=1
          
          # The kivy/buildozer image may have SDK at /home/user/.buildozer
          # First check what's available
          echo "Checking for pre-installed SDK..."
          ls -la /home/user/.buildozer/android/platform/ 2>/dev/null || echo "No pre-installed SDK"
          
          # Create license files for any SDK that might exist
          mkdir -p /home/user/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Also create for buildozer's expected download path
          mkdir -p /root/.buildozer/android/platform/android-sdk/licenses 2>/dev/null || true
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license 2>/dev/null || true
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license 2>/dev/null || true
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license 2>/dev/null || true
          
          # Check which user we are
          whoami
          
          # Build!
          buildozer android debug 2>&1 | tee buildozer.log
        shell: bash
        timeout-minutes: 60

      - name: Upload buildozer log (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoxyIRL-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_name == 'main' || github.ref_name == 'master'
        with:
          name: Roxy IRL v1.0
          tag_name: v1.0
          draft: false
          prerelease: false
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
